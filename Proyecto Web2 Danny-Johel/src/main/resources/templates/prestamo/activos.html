<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prestamos Activos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div class="app-shell">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="app-main">
        <!-- Vista administrativa para cerrar prestamos que aun estan activos -->
        <header class="page-header">
            <h1 class="page-title">Prestamos activos</h1>
            <p class="page-subtitle">Revise los prestamos pendientes y registre devoluciones</p>
        </header>

        <div th:replace="~{fragments/messages :: messages}"></div>

        <div class="actions page-actions">
            <a class="button button--secondary" th:href="@{/prestamo/historial}">Ver historial completo</a>
        </div>

        <section class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Usuario</th>
                    <th>Libro</th>
                    <th>Fecha prestamo</th>
                    <th>Fecha devolucion esperada</th>
                    <th>Accion</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="prestamo : ${prestamos}">
                    <td th:text="${prestamo.usuario.nombre}"></td>
                    <td th:text="${prestamo.libro.titulo}"></td>
                    <td th:text="${prestamo.fechaPrestamo}"></td>
                    <td th:text="${prestamo.fechaDevolucionEsperada}"></td>
                    <td>
                        <!-- El admin puede registrar la devolucion desde esta lista -->
                        <form th:action="@{/prestamo/devolver/{id}(id=${prestamo.id})}"
                              method="post">
                            <button type="submit">Registrar devolucion</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>
    </main>
</div>

</body>
</html>
