<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Prestamos Activos</title>
</head>
<body>

<h2>Prestamos Activos</h2>

<div th:if="${mensaje}" style="color:green">
    <p th:text="${mensaje}"></p>
</div>
<div th:if="${error}" style="color:red">
    <p th:text="${error}"></p>
</div>

<table border="1">
    <thead>
    <tr>
        <th>Usuario</th>
        <th>Libro</th>
        <th>Fecha Prestamo</th>
        <th>Fecha Devolucion Esperada</th>
        <th>Accion</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="prestamo : ${prestamos}">
        <td th:text="${prestamo.usuario.nombre}"></td>
        <td th:text="${prestamo.libro.titulo}"></td>
        <td th:text="${prestamo.fechaPrestamo}"></td>
        <td th:text="${prestamo.fechaDevolucionEsperada}"></td>
        <td>
            <form th:action="@{/prestamo/devolver/{id}(id=${prestamo.id})}"
                  method="post">
                <button type="submit">Registrar Devolucion</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<a href="/prestamo/historial">Ver historial completo</a> |
<a href="/libro/catalogo">Volver al catalogo</a>

</body>
</html>
