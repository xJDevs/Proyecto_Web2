<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-page">

<main class="auth-card">
    <!-- Pantalla publica para iniciar sesion con correo y contrasena -->
    <h1 class="auth-title">Iniciar sesion</h1>
    <p class="auth-subtitle">Ingrese con las credenciales registradas en el sistema</p>

    <div th:replace="~{fragments/messages :: messages}"></div>

    <!-- Los nombres correo y password deben coincidir con los @RequestParam del controller -->
    <form class="form-grid" th:action="@{/usuario/login}" method="post">
        <div class="form-field">
            <label for="correo">Correo</label>
            <input id="correo" type="email" name="correo" required/>
        </div>

        <div class="form-field">
            <label for="password">Contrasena</label>
            <input id="password" type="password" name="password" required/>
        </div>

        <button type="submit">Ingresar</button>
    </form>

    <p class="auth-footer">No tienes cuenta? <a th:href="@{/usuario/registro}">Registrate aqui</a></p>
</main>

</body>
</html>
